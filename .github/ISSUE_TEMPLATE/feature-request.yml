name: Feature request
description: Suggest an improvement to the app, workflow, or docs.
title: "[feature] <short description>"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What is missing, awkward, or currently hard to do?
      placeholder: "Describe the problem you are trying to solve..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see added or changed?
      placeholder: "Describe the improvement you have in mind..."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why this would help
      description: Explain the benefit, tradeoff, or workflow impact.
      placeholder: "Why would this be useful?"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Optional screenshots, references, examples, or edge cases.
      placeholder: "Anything else worth knowing..."

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked that this is not already covered by the current docs or release notes.
          required: true
