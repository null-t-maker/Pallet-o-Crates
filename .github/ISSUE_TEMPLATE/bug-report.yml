name: Bug report
description: Report a reproducible problem in the app, docs, or release artifacts.
title: "[bug] <short description>"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem.
      placeholder: "What went wrong?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What happened instead?"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, commit, or local branch state.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows release build
        - Local Tauri dev run
        - Frontend-only dev run
        - Other
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or extra context
      description: Optional, but useful for faster triage.
      placeholder: "Paste logs or add any extra context here..."

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I confirmed this is not just a translation wording issue.
          required: true
        - label: I included enough information for someone else to reproduce the problem.
          required: true
