name: Release (Windows)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and Publish Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pallet-o-Crates ${{ github.ref_name }}"
          releaseBody: |
            Experimental `0.x` Windows release for `${{ github.ref_name }}`.

            What this release includes:
            - Tauri desktop build for Windows
            - pallet layout generation
            - manual 3D editing workflow
            - sample database guidance and template-lock support

            What this release does not claim:
            - guaranteed global optimization
            - production-grade certainty for every mixed-carton case
            - native-speaker review for every shipped UI language

            Project docs:
            - [README](README.md)
            - [Contributing](CONTRIBUTING.md)
            - [Command Reference](docs/command-reference.md)
            - [Localization Workflow](docs/localization-workflow.md)
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
