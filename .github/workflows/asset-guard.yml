name: Critical Paths Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze PR changes
        shell: bash
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          added_count="$(git diff --name-only --diff-filter=A "$base_sha" "$head_sha" | wc -l | tr -d ' ')"
          deleted_count="$(git diff --name-only --diff-filter=D "$base_sha" "$head_sha" | wc -l | tr -d ' ')"
          renamed_count="$(git diff --name-only --diff-filter=R "$base_sha" "$head_sha" | wc -l | tr -d ' ')"

          critical_changed="$(git diff --name-only "$base_sha" "$head_sha" -- src-tauri/icons src/assets public | wc -l | tr -d ' ')"
          critical_deleted="$(git diff --name-only --diff-filter=D "$base_sha" "$head_sha" -- src-tauri/icons src/assets public | wc -l | tr -d ' ')"
          critical_renamed="$(git diff --name-only --diff-filter=R "$base_sha" "$head_sha" -- src-tauri/icons src/assets public | wc -l | tr -d ' ')"
          agent_instruction_changed="$(git diff --name-only "$base_sha" "$head_sha" -- AGENTS.md skills | wc -l | tr -d ' ')"

          deps_changed="$(git diff --name-only "$base_sha" "$head_sha" -- package.json package-lock.json pnpm-lock.yaml yarn.lock src-tauri/Cargo.toml src-tauri/Cargo.lock | wc -l | tr -d ' ')"

          agent_override="no"
          case " $PR_LABELS " in
            *" allow-agent-instructions "*) agent_override="yes" ;;
          esac

          {
            echo "## Critical Paths Guard summary"
            echo ""
            echo "- Files added: $added_count"
            echo "- Files deleted: $deleted_count"
            echo "- Files renamed: $renamed_count"
            echo "- Critical asset paths touched (src-tauri/icons, src/assets, public): $critical_changed"
            echo "- Agent instruction paths touched (AGENTS.md, skills/): $agent_instruction_changed"
            echo "- Agent instruction override label present: $agent_override"
            echo "- Dependency manifests/locks touched: $deps_changed"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$critical_deleted" -gt 0 ] || [ "$critical_renamed" -gt 0 ]; then
            echo "Critical Paths Guard blocked this PR: detected deletion or rename in critical asset paths." >&2
            echo "Please request explicit maintainer approval for asset structure changes." >&2
            exit 1
          fi

          if [ "$agent_instruction_changed" -gt 0 ] && [ "$agent_override" != "yes" ]; then
            echo "Critical Paths Guard blocked this PR: detected changes in AGENTS.md or skills/." >&2
            echo "If this change is intentional, add the 'allow-agent-instructions' label and describe the reason in the PR." >&2
            exit 1
          fi
